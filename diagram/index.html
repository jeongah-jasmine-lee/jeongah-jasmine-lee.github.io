<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasmine Lee | Research Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        
        /* Venn Diagram Styling - Ellipse Version */
        .venn-shape {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            opacity: 0.2;
            stroke-width: 1px;
        }
        .venn-shape:hover { opacity: 0.35; }
        .venn-shape.active { 
            opacity: 0.8; 
            stroke-width: 3px;
        }
        
        /* Compact Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.05);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .project-tag { font-size: 0.6rem; font-weight: 800; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; }
        
        .venn-label-item {
            font-size: 8px;
            font-weight: 700;
            fill: #334155;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .prelim-text {
            font-size: 9px;
            font-weight: 800;
            fill: #94a3b8;
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        /* Progress filter button active states */
        .progress-btn.active-published    { background: #e2ede9; color: #2d6a4f; }
        .progress-btn.active-review       { background: #ede8dc; color: #7a5c2e; }
        .progress-btn.active-submitted    { background: #e8e4f0; color: #4c3d7a; }
        .progress-btn.active-wip          { background: #dce8f0; color: #1e4f6b; }
    </style>
</head>
<body class="text-slate-900 h-screen overflow-hidden">

    <div id="app" class="h-full flex flex-col p-4 md:p-8 max-w-[1600px] mx-auto">
        <!-- Compact Header -->
        <header class="w-full mb-6 flex justify-between items-start border-b border-slate-100 pb-4">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900">Human-Computer Interaction, Human-AI Interaction</h1>
                <p class="text-blue-600 font-bold tracking-widest text-[15px] uppercase">Jasmine Lee • 2nd year CS PhD Student @ UMass Amherst</p>
            </div>
            
            <!-- Filter Controls: stacked vertically -->
            <div class="flex flex-col items-end gap-2 scale-90 origin-right">
                <!-- Author Filter -->
                <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                    <button onclick="setAuthorFilter('all')" id="btn-all" class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-slate-900 text-white">All</button>
                    <button onclick="setAuthorFilter(1)" id="btn-1" class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900">1st Author</button>
                    <button onclick="setAuthorFilter(2)" id="btn-2" class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900">2nd Author</button>
                </div>
                <!-- Progress Filter -->
                <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                    <button onclick="setProgressFilter('all')" id="pbtn-all" class="progress-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-slate-900 text-white">All</button>
                    <button onclick="setProgressFilter('Published')" id="pbtn-Published" class="progress-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900">Published</button>
                    <button onclick="setProgressFilter('Under Review')" id="pbtn-Under Review" class="progress-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900">Under Review</button>
                    <button onclick="setProgressFilter('To be submitted')" id="pbtn-To be submitted" class="progress-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900">To be submitted</button>
                    <button onclick="setProgressFilter('Work in Progress')" id="pbtn-Work in Progress" class="progress-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900">Work in Progress</button>
                </div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 min-h-0">
            
            <!-- Left: Larger Venn Diagram (7/12 cols) -->
            <div class="lg:col-span-5 flex flex-col items-center justify-center bg-white/50 rounded-[2rem] border border-slate-100 shadow-sm relative p-4">
                <div class="w-full h-full max-w-3xl">
                    <svg viewBox="0 0 500 400" class="w-full h-full">
                        <!-- Preliminary Markers in White Space -->
                        <text x="20" y="40" class="prelim-text">PRELIMINARY RESEARCH</text>
                        <text x="25" y="50" font-size="8" fill="#cbd5e1" font-weight="600" id="prelim-1-label">• [SVG Decomposition - Arxiv]</text>
                        
                        <text x="350" y="340" class="prelim-text">PRELIMINARY RESEARCH</text>
                        <text x="355" y="350" font-size="8" fill="#cbd5e1" font-weight="600" id="prelim-2-label">• [Glanceable Health VIS- Arxiv]</text>

                        <text x="300" y="380" class="prelim-text">ETC / PAST WORKS</text>
                        <text x="300" y="390" font-size="7" fill="#cbd5e1" font-weight="600" id="etc-label">• [IoT Edge-Cloud - Published, IEEE Network Magazine]</text>
                        
                        <!-- Venn Shapes -->
                        <ellipse cx="180" cy="160" rx="150" ry="100" fill="#3b82f6" class="venn-shape" id="shape-Visualization" onclick="toggleCategory('Visualization')" stroke="#2563eb" />
                        <ellipse cx="320" cy="160" rx="150" ry="100" fill="#f43f5e" class="venn-shape" id="shape-Mental-Health" onclick="toggleCategory('Mental Health')" stroke="#e11d48" />
                        <!-- Sensors ellipse: smaller (rx 150→105, ry 100→72), center shifted slightly up -->
                        <ellipse cx="250" cy="255" rx="105" ry="72" fill="#10b981" class="venn-shape" id="shape-Sensors" onclick="toggleCategory('Sensors')" stroke="#059669" />
                        
                        <!-- Titles -->
                        <text x="60" y="145" font-weight="900" font-size="14" fill="#1e40af" class="pointer-events-none tracking-tight">VISUALIZATION</text>
                        <text x="310" y="145" font-weight="900" font-size="14" fill="#9f1239" class="pointer-events-none tracking-tight">MENTAL HEALTH</text>
                        <!-- BEHAVIOR SENSING label: repositioned to stay inside the smaller ellipse -->
                        <text x="188" y="305" font-weight="900" font-size="12" fill="#065f46" class="pointer-events-none tracking-tight">BEHAVIOR SENSING</text>

                        <g id="svg-labels"></g>
                    </svg>
                </div>
                <div class="absolute bottom-4 left-6 flex gap-4 text-[9px] font-bold text-slate-400 uppercase tracking-widest bg-white/80 px-4 py-2 rounded-full border border-slate-100">
                    <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span> Vis</span>
                    <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-rose-400"></span> Mental</span>
                    <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Sensors</span>
                </div>
            </div>

            <!-- Right: Denser Project Grid (5/12 cols) -->
            <div class="lg:col-span-7 flex flex-col gap-3 overflow-y-auto pr-2 custom-scrollbar" id="project-list-container">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="project-list">
                    <!-- Cards injected here -->
                </div>
            </div>
        </main>

        <footer class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center text-[9px] font-bold text-slate-400 uppercase tracking-widest">
            <p>© 2026 Jeongah Jasmine Lee</p>
            <div class="flex gap-4">
                <a href="#" class="hover:text-blue-600 transition-colors">Scholar</a>
                <a href="#" class="hover:text-blue-600 transition-colors">LinkedIn</a>
            </div>
        </footer>
    </div>

    <script>
        const projects = [
            {
                shortTitle: "Cohort-based Semantic Labeling - Under Review, VIS 26",
                progress: "Under Review",
                fullTitle: "Cohort-based Semantic Labeling: AI-Enabled Recovery of Visualization Semantics from Deployed SVGs",
                rq: "How can we recover high-level semantic structures and data encodings from raw, deployed SVGs?",
                methodology: "We propose and evaluate a multi-stage pipeline (CSL) that groups SVG elements into structural cohorts, applies AI-assisted semantic inference, and grounds labels back to primitives, validated on a corpus of 102 SVGs.",
                category: "Visualization",
                role: 1,
                color: "blue",
                venue: "IEEE VIS '26"
            },
            {
                shortTitle: "Agentic Accessibility for BLV - To be submitted, ASSETS 26",
                progress: "To be submitted",
                fullTitle: "Towards Agentic Floorplan Accessibility for Blind and Low-Vision",
                rq: "How can conversational agents support effective exploration of complex spatial graphics for blind and low-vision users?",
                methodology: "We conducted a between-subjects user study (BLV vs. sighted) using a conversational agent prototype with summary-first vs. cold-start interaction modes to analyze exploration behavior and understanding.",
                category: "Visualization",
                role: 1,
                color: "blue",
                venue: "ACM ASSETS"
            },
            {
                shortTitle: "From Text to Visuals - Published, AIED 25",
                progress: "Published",
                fullTitle: "From Text to Visuals: Using LLMs to Generate Math Diagrams",
                rq: "How can LLMs generate accurate and pedagogically effective math diagrams from textual hints using structured representations like SVG?",
                methodology: "We design an LLM prompting pipeline with in-context learning to generate SVG-based diagrams from text and evaluate them using a VQA-based framework with semantic and syntactic criteria.",
                category: "Visualization",
                role: 2,
                color: "blue",
                venue: "AIED 2025"
            },
            {
                shortTitle: "Carey - Work in Progress",
                progress: "Work in Progress",
                fullTitle: "Carey: An AI-Powered Multi-Agent System for Supporting Alzheimer's Caregivers' Mental Health",
                rq: "How can a multi-agent conversational system provide safe, personalized, and continuous emotional and informational support for Alzheimer's caregivers in real-world settings?",
                methodology: "We design and deploy a multi-agent LLM-based system (journaling, venting, CBT reframing, and RAG-based information support with safeguarding and context management) and evaluate its impact through a 6-week real-world deployment tracking user engagement, behavioral patterns, and well-being indicators.",
                category: "Mental Health",
                role: 1,
                color: "rose",
                venue: "HCI-VIS Lab"
            },
            {
                shortTitle: "Rupture - To be submitted, IMWUT 26",
                progress: "To be submitted",
                fullTitle: "Understanding and Designing Rupture Handling in AI Mental Health Conversations",
                rq: "How accurately do LLMs identify therapeutic alliance ruptures and generate clinically appropriate repair strategies compared to mental health professionals?",
                methodology: "We conduct a mixed-methods study with mental health professionals using scenario-based evaluations, where clinicians assess LLM rupture identification and repair strategies across conversations, supplemented by qualitative interview insights on alignment and failure patterns.",
                category: "Mental Health",
                role: 1,
                color: "rose",
                venue: "IMWUT"
            },
            {
                shortTitle: "RubRIX - Under Review, ACL 26",
                progress: "Under Review",
                fullTitle: "RubRIX: Rubric-Driven Risk Mitigation in Caregiver-AI Interactions",
                rq: "How can interactional risks in LLM-generated caregiving responses be systematically characterized and mitigated using a domain-specific evaluation framework?",
                methodology: "We develop a clinician-validated rubric (RubRIX) grounded in thematic analysis and ethics-of-care theory, evaluate LLM responses on large-scale real-world caregiver datasets (~20K queries), and apply iterative rubric-guided refinement to quantify risk reduction.",
                category: "Mental Health",
                role: 2,
                color: "rose",
                venue: "ACL"
            },
            {
                shortTitle: "Gratitude Journaling - Work in Progress",
                progress: "Work in Progress",
                fullTitle: "Understanding Gratitude Practices: Motivations, Engagement, and Design Opportunities for Sustained Wellbeing",
                rq: "How do individuals initiate, sustain, and evolve gratitude practices, and what factors shape their long-term engagement and impact on wellbeing?",
                methodology: "We conduct a qualitative interview study to identify themes in motivations, routines, benefits, barriers, and longitudinal evolution of gratitude practices, and derive design implications for supportive digital interventions.",
                category: "Mental Health",
                role: 2,
                color: "rose",
                venue: "Mental Health Study"
            },
            {
                shortTitle: "Engagement - IMWUT Under Review",
                progress: "Under Review",
                fullTitle: "En3: A Tripartite Approach Toward Holistic Understanding and Detection of Engagement in Educational Video Content",
                rq: "How can head-based multimodal sensing (EEG, eye tracking, and EDA) be used to accurately model different dimensions of user engagement in educational video settings?",
                methodology: "We conduct a mixed-methods study with 30 participants using a head-worn multimodal sensing system, combining physiological data (EEG, eye, EDA), segment-level self-reports, comprehension measures, and semi-structured interviews to evaluate engagement detection and conceptual alignment.",
                category: "Sensors",
                role: 2,
                color: "emerald",
                venue: "IMWUT"
            },
            {
                shortTitle: "Music Preferences - Work in Progress",
                progress: "Work in Progress",
                fullTitle: "Sensing Music Preference from Physiological Signals: A Multimodal Approach using EEG and EDA",
                rq: "How can physiological signals (EEG and EDA) be used to infer users' music preferences and affective responses during listening?",
                methodology: "We conduct a user study where participants listen to music stimuli while wearing Frenz EEG and EmotiBit EDA sensors, and train multimodal models to predict preference and affect from synchronized physiological signals.",
                category: "Sensors",
                role: 2,
                color: "emerald",
                venue: "Ongoing Research"
            },
            {
                shortTitle: "Decomposition",
                progress: "Preliminary Study",
                fullTitle: "SVG Decomposition for Enhancing Large Multimodal Models' Visualization Comprehension: A Study with Floor Plans",
                rq: "How does vector-based decomposition (SVG) affect large multimodal models' ability to understand and reason about spatial visualizations such as floor plans?",
                methodology: "We conduct an experimental evaluation across 75 floor plans using multiple LMMs (GPT-4o, Claude, Llama) under PNG-only, SVG-only, and combined conditions, measuring performance on spatial understanding and reasoning tasks.",
                category: "Preliminary",
                role: 1,
                color: "slate",
                venue: "Preliminary Study"
            },
            {
                shortTitle: "Glanceable",
                progress: "Preliminary Study",
                fullTitle: "Towards an Age-Inclusive Understanding of Trust and Interpretation in AI-Generated Glanceable Health Visualizations",
                rq: "How do users of different age groups interpret and trust AI-generated glanceable health visualizations on smartwatch interfaces?",
                methodology: "We conduct a two-stage study combining model-based visualization generation and evaluation with a user study comparing younger and older adults' interpretation, perception, and trust across selected health visualization scenarios.",
                category: "Preliminary",
                role: 1,
                color: "slate",
                venue: "Preliminary Study"
            },
            {
                shortTitle: "IoT Edge-Cloud",
                progress: "Published",
                fullTitle: "IoT Edge-Cloud: An Internet-of-Things Edge-Empowered Cloud System for Device Management in Smart Spaces",
                rq: "How can IoT devices be efficiently managed and visually controlled in smart spaces using integrated edge-cloud architectures with location-aware services?",
                methodology: "We design and implement an IoT edge-cloud system combining DNS-based device naming, indoor localization (PDR + particle filter), and CoAP-based control, and evaluate its performance through a real-world testbed.",
                category: "ETC",
                role: 2, 
                color: "slate",
                venue: "2023 IEEE Network Magazine"
            }
        ];

        let currentAuthorFilter = 'all';
        let currentCategory = 'all';
        let currentProgressFilter = 'all';

        // Progress → color class mapping
        const progressColorMap = {
            'Published':        { active: 'active-published', bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-200' },
            'Under Review':     { active: 'active-review',    bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-200' },
            'To be submitted':  { active: 'active-submitted', bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-200' },
            'Work in Progress': { active: 'active-wip',       bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-200' },
            'Preliminary Study':{ active: '',                 bg: 'bg-slate-100', text: 'text-slate-400', border: 'border-slate-200' },
        };

        function setAuthorFilter(role) {
            currentAuthorFilter = role;
            updateUI();
        }

        function setProgressFilter(val) {
            currentProgressFilter = val;
            updateUI();
        }

        function toggleCategory(cat) {
            if (currentCategory === cat) currentCategory = 'all';
            else currentCategory = cat;
            updateUI();
        }

        function updateUI() {
            // ── Author Filter Buttons ──────────────────────────────────────
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-900', 'text-white', 'bg-blue-600', 'bg-indigo-600');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`btn-${currentAuthorFilter}`);
            activeBtn.classList.remove('text-slate-500');
            if (currentAuthorFilter === 'all') activeBtn.classList.add('bg-slate-900', 'text-white');
            else if (currentAuthorFilter === 1) activeBtn.classList.add('bg-blue-600', 'text-white');
            else activeBtn.classList.add('bg-indigo-600', 'text-white');

            // ── Progress Filter Buttons ────────────────────────────────────
            const progressKeys = ['all', 'Published', 'Under Review', 'To be submitted', 'Work in Progress'];
            progressKeys.forEach(key => {
                const btn = document.getElementById(`pbtn-${key}`);
                if (!btn) return;
                // reset
                btn.className = 'progress-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900';
                if (key === currentProgressFilter) {
                    if (key === 'all') {
                        btn.classList.add('bg-slate-900', 'text-white');
                        btn.classList.remove('text-slate-500', 'hover:text-slate-900');
                    } else {
                        btn.classList.add(progressColorMap[key].active);
                        btn.classList.remove('text-slate-500', 'hover:text-slate-900');
                    }
                }
            });

            // ── Venn Shapes ────────────────────────────────────────────────
            document.querySelectorAll('.venn-shape').forEach(c => {
                c.classList.remove('active');
                if (currentCategory === 'all') c.style.opacity = "0.2";
                else if (c.id === `shape-${currentCategory.replace(' ', '-')}`) {
                    c.classList.add('active');
                } else {
                    c.style.opacity = "0.05";
                }
            });

            // ── Preliminary Labels ─────────────────────────────────────────
            const p1 = document.getElementById('prelim-1-label');
            const p2 = document.getElementById('prelim-2-label');
            if (currentCategory === 'all') {
                p1.setAttribute("opacity", "1"); p2.setAttribute("opacity", "1");
            } else {
                p1.setAttribute("opacity", "0.1"); p2.setAttribute("opacity", "0.1");
            }

            // ── SVG Mini Labels ────────────────────────────────────────────
            const labelContainer = document.getElementById('svg-labels');
            labelContainer.innerHTML = '';
            const posMap = {
                'Visualization': { x: 50,  y: 165 },
                'Mental Health':  { x: 300, y: 165 },
                // Shifted right to stay inside the smaller ellipse (left edge ≈ cx−rx = 145)
                'Sensors':        { x: 163, y: 268 }
            };

            Object.keys(posMap).forEach(cat => {
                const catProjects = projects.filter(p =>
                    p.category === cat &&
                    (currentAuthorFilter === 'all' || p.role === currentAuthorFilter) &&
                    (currentProgressFilter === 'all' || p.progress === currentProgressFilter)
                );
                catProjects.slice(0, 4).forEach((p, i) => {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", posMap[cat].x);
                    text.setAttribute("y", posMap[cat].y + (i * 10));
                    text.setAttribute("class", "venn-label-item");
                    text.textContent = `[${p.shortTitle}]`;
                    if (currentCategory !== 'all' && currentCategory !== cat) text.setAttribute("opacity", "0.1");
                    labelContainer.appendChild(text);
                });
            });

            // ── Project Card List ──────────────────────────────────────────
            const filtered = projects.filter(p => {
                const authorMatch = currentAuthorFilter === 'all' || p.role === currentAuthorFilter;

                let categoryMatch = false;
                if (currentCategory === 'all') categoryMatch = true;
                else categoryMatch = p.category === currentCategory;

                const progressMatch = currentProgressFilter === 'all' || p.progress === currentProgressFilter;

                return authorMatch && categoryMatch && progressMatch;
            });

            const listContainer = document.getElementById('project-list');
            listContainer.innerHTML = '';

            filtered.forEach(p => {
                const pc = progressColorMap[p.progress] || progressColorMap['Preliminary Study'];
                const card = document.createElement('div');
                card.className = "glass-card p-3 rounded-xl flex flex-col gap-2";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="project-tag ${pc.bg} ${pc.text} border ${pc.border}">${p.progress}</span>
                        <span class="text-[8px] font-bold text-slate-300 uppercase">${p.role === 1 ? '1st' : '2nd'} Auth</span>
                    </div>
                    <h3 class="text-[11px] font-extrabold text-slate-900 leading-tight">${p.fullTitle}</h3>
                    <div class="flex flex-col gap-1.5">
                        <p class="text-[9px] text-slate-600 leading-tight italic">"${p.rq}"</p>
                        <p class="text-[9px] text-slate-500 leading-tight border-l-2 border-slate-100 pl-2">${p.methodology}</p>
                    </div>
                    <div class="mt-auto pt-2 flex justify-between items-center opacity-60">
                        <span class="text-[8px] font-bold text-slate-400">${p.venue}</span>
                        <i data-lucide="arrow-up-right" size="10"></i>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            lucide.createIcons();
        }
        updateUI();
    </script>
</body>
</html>
