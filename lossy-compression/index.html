<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVG Shortener </title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel { border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
    .panel h2 { font-size: 14px; margin: 0 0 8px; }
    textarea { width: 100%; height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 10px 0 14px; }
    button { padding: 8px 10px; border: 1px solid #ccc; border-radius: 10px; background: #fff; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .kpi { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-top: 8px; }
    .kpi .card { border: 1px solid #eee; border-radius: 10px; padding: 8px; }
    .kpi .label { font-size: 11px; color: #666; }
    .kpi .value { font-size: 13px; font-weight: 600; }
    .renderGrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .renderBox { border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
    canvas { width: 100%; height: auto; border-radius: 8px; background: #fff; }
    .small { font-size: 12px; color: #555; }
    .log { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; background: #fafafa; border: 1px solid #eee; padding: 8px; border-radius: 10px; height: 140px; overflow: auto; }
    .mono { font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <h1>SVG Shortener — pixel-identical</h1>

  <div class="controls">
    <input id="file" type="file" accept=".svg,image/svg+xml" />
    <button id="run" disabled>Run pipeline</button>
    <button id="step" disabled>Step mode</button>
    <label class="small">Scale
      <select id="scale">
        <option value="1">1×</option>
        <option value="2" selected>2×</option>
        <option value="3">3×</option>
      </select>
    </label>
    <label class="small">Background
      <select id="bg">
        <option value="transparent">transparent</option>
        <option value="white" selected>white</option>
      </select>
    </label>
    <label class="small">Font override
      <input id="font" type="text" value="Arial, sans-serif" style="width:220px" />
    </label>
  </div>

  <div class="kpi">
    <div class="card"><div class="label">Original chars</div><div class="value mono" id="origChars">—</div></div>
    <div class="card"><div class="label">Shortened chars</div><div class="value mono" id="newChars">—</div></div>
    <div class="card"><div class="label">Est. tokens (chars/4)</div><div class="value mono" id="tok">—</div></div>
    <div class="card"><div class="label">Pixel diff (must be 0)</div><div class="value mono" id="diff">—</div></div>
  </div>

  <div class="grid" style="margin-top:12px;">
    <div class="panel">
      <h2>Original SVG</h2>
      <textarea id="orig" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <h2>Shortened SVG</h2>
      <textarea id="out" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="renderGrid" style="margin-top:12px;">
    <div class="renderBox">
      <h2 style="font-size:14px;margin:0 0 8px;">Original render</h2>
      <canvas id="c0"></canvas>
    </div>
    <div class="renderBox">
      <h2 style="font-size:14px;margin:0 0 8px;">Shortened render</h2>
      <canvas id="c1"></canvas>
    </div>
    <div class="renderBox">
      <h2 style="font-size:14px;margin:0 0 8px;">Diff heatmap</h2>
      <canvas id="cd"></canvas>
      <div class="small" style="margin-top:6px;">Heatmap highlights pixels that differ (red). For strict mode, diff must be 0.</div>
    </div>
  </div>

  <div style="margin-top:12px;" class="panel">
    <h2>Log</h2>
    <div id="log" class="log"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);

const fileInput = $('file');
const runBtn = $('run');
const stepBtn = $('step');
const origTA = $('orig');
const outTA = $('out');
const logEl = $('log');

const origCharsEl = $('origChars');
const newCharsEl  = $('newChars');
const tokEl       = $('tok');
const diffEl      = $('diff');

function log(msg) {
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog(){ logEl.textContent = ""; }

function estTokens(s) { return Math.ceil((s || "").length / 4); }

function parseSVG(svgText) {
  const p = new DOMParser();
  const doc = p.parseFromString(svgText, "image/svg+xml");
  const parseError = doc.querySelector("parsererror");
  if (parseError) throw new Error("SVG parse error: " + parseError.textContent.slice(0, 200));
  const svg = doc.documentElement;
  if (!svg || svg.tagName.toLowerCase() !== "svg") throw new Error("Not an SVG root.");
  return { doc, svg };
}

function serializeSVG(svgEl) {
  // Ensure xmlns present
  if (!svgEl.getAttribute("xmlns")) svgEl.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  const s = new XMLSerializer().serializeToString(svgEl);
  // Light minify: collapse inter-tag whitespace
  return s.replace(/>\s+</g, "><").trim();
}

function getRefs(svgEl) {
  const refs = new Set();
  const walker = document.createTreeWalker(svgEl, NodeFilter.SHOW_ELEMENT);
  let n = walker.currentNode;
  while(n) {
    for (const attr of n.attributes || []) {
      const v = attr.value;
      // url(#id)
      const m1 = v.match(/url\(#([^)]+)\)/);
      if (m1) refs.add(m1[1]);
      // href="#id" or xlink:href
      const m2 = v.match(/^#(.+)$/);
      if ((attr.name === "href" || attr.name.endsWith(":href")) && m2) refs.add(m2[1]);
    }
    n = walker.nextNode();
  }
  return refs;
}

function removeMetadata(svgEl) {
  svgEl.querySelectorAll("metadata, desc, title").forEach(e => e.remove());
}

function removeComments(svgEl) {
  const walker = document.createTreeWalker(svgEl, NodeFilter.SHOW_COMMENT);
  const toRemove = [];
  let n = walker.nextNode();
  while(n) { toRemove.push(n); n = walker.nextNode(); }
  toRemove.forEach(c => c.remove());
}

function isNonRendering(el) {
  const tag = el.tagName.toLowerCase();
  if (tag === "defs") return false;
  const disp = el.getAttribute("display");
  if (disp && disp.toLowerCase() === "none") return true;
  const op = el.getAttribute("opacity");
  if (op !== null && Number(op) === 0) return true;
  // shapes with no fill and no stroke
  const fill = el.getAttribute("fill") ?? (el.getAttribute("style")?.match(/fill\s*:\s*([^;]+)/)?.[1] ?? null);
  const stroke = el.getAttribute("stroke") ?? (el.getAttribute("style")?.match(/stroke\s*:\s*([^;]+)/)?.[1] ?? null);
  const hasGeom = ["path","rect","circle","ellipse","line","polyline","polygon","text"].includes(tag);
  if (hasGeom) {
    const fillNone = (fill && fill.trim() === "none");
    const strokeNone = (stroke && stroke.trim() === "none");
    if ((fill === null || fillNone) && (stroke === null || strokeNone)) return true;
  }
  return false;
}

function pruneNonRendering(svgEl) {
  // remove elements bottom-up
  const all = Array.from(svgEl.querySelectorAll("*")).reverse();
  for (const el of all) {
    if (isNonRendering(el)) el.remove();
  }
  // remove empty groups
  svgEl.querySelectorAll("g").forEach(g => { if (g.children.length === 0 && !g.textContent.trim()) g.remove(); });
}

function pruneUnusedIdsAndDefs(svgEl) {
  const refs = getRefs(svgEl);

  // Prune defs children not referenced by id
  svgEl.querySelectorAll("defs").forEach(defs => {
    Array.from(defs.children).forEach(ch => {
      const id = ch.getAttribute("id");
      if (id && !refs.has(id)) ch.remove();
    });
    if (defs.children.length === 0) defs.remove();
  });

  // Remove ids that are not referenced
  svgEl.querySelectorAll("[id]").forEach(el => {
    const id = el.getAttribute("id");
    if (id && !refs.has(id)) el.removeAttribute("id");
  });
}

function shortenReferencedIds(svgEl) {
  const refs = getRefs(svgEl);
  const ids = Array.from(refs);
  const map = new Map();
  const alphabet = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let idx = 0;
  function nextId() {
    let n = idx++;
    let s = "";
    do { s = alphabet[n % alphabet.length] + s; n = Math.floor(n / alphabet.length) - 1; } while (n >= 0);
    return s;
  }
  for (const oldId of ids) map.set(oldId, nextId());

  // Update id attributes
  svgEl.querySelectorAll("[id]").forEach(el => {
    const id = el.getAttribute("id");
    if (id && map.has(id)) el.setAttribute("id", map.get(id));
  });

  // Update references
  const walker = document.createTreeWalker(svgEl, NodeFilter.SHOW_ELEMENT);
  let n = walker.currentNode;
  while (n) {
    for (const attr of n.attributes || []) {
      let v = attr.value;
      // url(#id)
      v = v.replace(/url\(#([^)]+)\)/g, (m, g1) => map.has(g1) ? `url(#${map.get(g1)})` : m);
      // href="#id"
      if (attr.name === "href" || attr.name.endsWith(":href")) {
        v = v.replace(/^#(.+)$/, (m, g1) => map.has(g1) ? `#${map.get(g1)}` : m);
      }
      if (v !== attr.value) n.setAttribute(attr.name, v);
    }
    n = walker.nextNode();
  }
}

function normalizeColors(svgEl) {
  const rgbToHex = (s) => {
    const m = s.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
    if (!m) return s;
    const r = Number(m[1]), g = Number(m[2]), b = Number(m[3]);
    const hx = (n)=>n.toString(16).padStart(2,'0');
    let hex = `#${hx(r)}${hx(g)}${hx(b)}`.toLowerCase();
    // shorten #rrggbb -> #rgb when possible
    if (hex[1]===hex[2] && hex[3]===hex[4] && hex[5]===hex[6]) hex = `#${hex[1]}${hex[3]}${hex[5]}`;
    return hex;
  };

  const walker = document.createTreeWalker(svgEl, NodeFilter.SHOW_ELEMENT);
  let n = walker.currentNode;
  while(n) {
    for (const a of Array.from(n.attributes || [])) {
      if (["fill","stroke","stop-color","color"].includes(a.name)) {
        const nv = rgbToHex(a.value);
        if (nv !== a.value) n.setAttribute(a.name, nv);
      }
      if (a.name === "style") {
        // replace rgb(...) inside style
        const nv = a.value.replace(/rgb\s*\(\s*\d+\s*,\s*\d+\s*,\s*\d+\s*\)/gi, (m)=>rgbToHex(m));
        if (nv !== a.value) n.setAttribute("style", nv);
      }
    }
    n = walker.nextNode();
  }
}

function parseStyle(styleText) {
  const m = new Map();
  if (!styleText) return m;
  styleText.split(";").forEach(part => {
    const [k,v] = part.split(":");
    if (!k || !v) return;
    const key = k.trim().toLowerCase();
    const val = v.trim();
    if (key) m.set(key, val);
  });
  return m;
}
function styleMapToText(m) {
  const parts = [];
  for (const [k,v] of m.entries()) parts.push(`${k}:${v}`);
  return parts.join(";");
}

const STYLE_KEYS = [
  "fill","fill-opacity","stroke","stroke-width","stroke-opacity","stroke-linecap","stroke-linejoin","stroke-dasharray","stroke-dashoffset",
  "opacity","font-family","font-size","font-weight","text-anchor","dominant-baseline","shape-rendering"
];

function getPresentationStyle(el) {
  const m = new Map();
  // from style=""
  const s = parseStyle(el.getAttribute("style") || "");
  for (const [k,v] of s.entries()) if (STYLE_KEYS.includes(k)) m.set(k, v);
  // from attributes
  for (const k of STYLE_KEYS) {
    if (el.hasAttribute(k)) m.set(k, el.getAttribute(k));
  }
  return m;
}

function applyClassFactorization(svgEl) {
  // Build signatures
  const elems = Array.from(svgEl.querySelectorAll("*")).filter(el => el.tagName && el.tagName.toLowerCase() !== "defs" && el.tagName.toLowerCase() !== "style");
  const sigToEls = new Map();

  for (const el of elems) {
    const m = getPresentationStyle(el);
    if (m.size === 0) continue;
    // signature string sorted keys
    const sig = Array.from(m.entries()).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>`${k}=${v}`).join("|");
    if (!sigToEls.has(sig)) sigToEls.set(sig, []);
    sigToEls.get(sig).push(el);
  }

  // Create classes for signatures with enough repetition
  const MIN_REUSE = 5;
  const classRules = [];
  let classIdx = 1;

  for (const [sig, els] of sigToEls.entries()) {
    if (els.length < MIN_REUSE) continue;
    const cls = `c${classIdx++}`;
    // turn sig back into css
    const css = sig.split("|").map(kv => kv.replace("=", ":")).join(";");
    classRules.push(`.${cls}{${css}}`);
    for (const el of els) {
      // Remove style attrs covered by class
      const m = getPresentationStyle(el);
      for (const k of m.keys()) {
        el.removeAttribute(k);
      }
      el.removeAttribute("style"); // style already included in sig; safe to remove
      // Append class
      const prev = el.getAttribute("class");
      el.setAttribute("class", prev ? `${prev} ${cls}` : cls);
    }
  }

  if (classRules.length) {
    // Insert style as first child
    const styleEl = svgEl.ownerDocument.createElementNS("http://www.w3.org/2000/svg", "style");
    styleEl.textContent = classRules.join("");
    // Prepend
    svgEl.insertBefore(styleEl, svgEl.firstChild);
  }
}

function safeFlattenGroups(svgEl) {
  // Flatten <g> that has no visual-affecting attrs
  const SAFE_ATTRS = new Set(["id","class"]);
  const gs = Array.from(svgEl.querySelectorAll("g"));
  for (const g of gs) {
    const attrs = Array.from(g.attributes || []);
    const unsafe = attrs.some(a => !SAFE_ATTRS.has(a.name));
    if (unsafe) continue;
    // Move children to parent
    const parent = g.parentNode;
    if (!parent) continue;
    while (g.firstChild) parent.insertBefore(g.firstChild, g);
    g.remove();
  }
}

function injectFontOverride(svgEl, fontFamily) {
  if (!fontFamily) return;
  // Add style rule to enforce font-family on text (do not touch existing if user wants)
  const styleEl = svgEl.ownerDocument.createElementNS("http://www.w3.org/2000/svg", "style");
  styleEl.textContent = `text{font-family:${fontFamily};}`;
  svgEl.insertBefore(styleEl, svgEl.firstChild);
}

function minifyPathData(svgEl) {
  svgEl.querySelectorAll("path[d]").forEach(p => {
    let d = p.getAttribute("d");
    if (!d) return;
    d = d.replace(/,/g, " ");
    d = d.replace(/\s+/g, " ").trim();
    // shorten leading zeros in decimals: 0.5 -> .5, -0.5 -> -.5
    d = d.replace(/\b(-?)0\.(\d+)/g, "$1.$2");
    // remove trailing zeros in decimals: 1.2300 -> 1.23, 1.0 -> 1
    d = d.replace(/(-?\d+)\.(\d*?)0+\b/g, (m, a, b) => b ? `${a}.${b}` : a);
    // remove unnecessary spaces around command letters
    d = d.replace(/\s*([A-Za-z])\s*/g, "$1");
    // re-add spaces between numbers/commands minimally (keep as is; browsers parse compactly)
    p.setAttribute("d", d);
  });
}

function roundNumbersInAny(svgEl, decimals, mode) {
  // mode: 'geom' (all numeric attrs + style), 'path' (path d only)
  const reNum = /-?\d*\.?\d+(?:e[-+]?\d+)?/gi;
  const roundStr = (s) => {
    return s.replace(reNum, (m) => {
      // skip scientific notation to avoid weird rounding; keep as-is
      if (/e/i.test(m)) return m;
      const x = Number(m);
      if (!isFinite(x)) return m;
      const f = Math.pow(10, decimals);
      const y = Math.round(x * f) / f;
      // stringify compactly
      let out = String(y);
      // shorten leading zero
      out = out.replace(/^(-?)0\.(\d+)/, '$1.$2');
      return out;
    });
  };

  if (mode === "path") {
    svgEl.querySelectorAll("path[d]").forEach(p => p.setAttribute("d", roundStr(p.getAttribute("d"))));
    return;
  }

  // geometry attrs + style + path
  const walker = document.createTreeWalker(svgEl, NodeFilter.SHOW_ELEMENT);
  let n = walker.currentNode;
  while(n) {
    for (const a of Array.from(n.attributes || [])) {
      if (a.name === "d" && n.tagName.toLowerCase() === "path") {
        n.setAttribute("d", roundStr(a.value));
      } else if (a.name === "style") {
        n.setAttribute("style", roundStr(a.value));
      } else {
        // attributes that are likely numeric
        if (/[0-9]/.test(a.value)) {
          n.setAttribute(a.name, roundStr(a.value));
        }
      }
    }
    n = walker.nextNode();
  }
}

function minifyAttributes(svgEl) {
  // remove explicit opacity=1 (often redundant) but verify later anyway
  svgEl.querySelectorAll("[opacity='1'],[opacity='1.0']").forEach(el => el.removeAttribute("opacity"));
  // remove style="opacity: 1;" patterns
  svgEl.querySelectorAll("[style]").forEach(el => {
    const sm = parseStyle(el.getAttribute("style"));
    if (sm.get("opacity") === "1" || sm.get("opacity") === "1.0") sm.delete("opacity");
    const st = styleMapToText(sm);
    if (!st) el.removeAttribute("style");
    else el.setAttribute("style", st);
  });
}

function getRenderSize(svgText) {
  // Determine a stable raster size: prefer viewBox
  try {
    const { svg } = parseSVG(svgText);
    const vb = svg.getAttribute("viewBox");
    const wAttr = svg.getAttribute("width");
    const hAttr = svg.getAttribute("height");
    if (vb) {
      const parts = vb.trim().split(/[ ,]+/).map(Number);
      if (parts.length === 4 && parts.every(n => isFinite(n))) {
        return { w: Math.max(1, Math.round(parts[2])), h: Math.max(1, Math.round(parts[3])) };
      }
    }
    if (wAttr && hAttr) {
      const w = Math.round(parseFloat(wAttr));
      const h = Math.round(parseFloat(hAttr));
      if (isFinite(w) && isFinite(h)) return { w: Math.max(1,w), h: Math.max(1,h) };
    }
  } catch {}
  // fallback
  return { w: 800, h: 600 };
}

async function renderToCanvas(svgText, canvas, scale, bg) {
  const { w, h } = getRenderSize(svgText);
  const cw = Math.max(1, Math.round(w * scale));
  const ch = Math.max(1, Math.round(h * scale));

  canvas.width = cw;
  canvas.height = ch;

  const ctx = canvas.getContext("2d");
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cw,ch);

  if (bg === "white") {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0,0,cw,ch);
  }

  const blob = new Blob([svgText], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.decoding = "async";

  await new Promise((resolve, reject) => {
    img.onload = () => resolve();
    img.onerror = () => reject(new Error("Failed to load SVG into Image()"));
    img.src = url;
  });

  ctx.drawImage(img, 0, 0, cw, ch);
  URL.revokeObjectURL(url);

  return ctx.getImageData(0,0,cw,ch);
}

function diffImageData(a, b, diffCanvas) {
  if (a.width !== b.width || a.height !== b.height) throw new Error("ImageData size mismatch");
  const w = a.width, h = a.height;
  const da = a.data, db = b.data;

  const out = diffCanvas.getContext("2d").createImageData(w, h);
  let diffPixels = 0;
  let maxChannelDiff = 0;

  for (let i=0;i<da.length;i+=4) {
    const dr = Math.abs(da[i]-db[i]);
    const dg = Math.abs(da[i+1]-db[i+1]);
    const dbb= Math.abs(da[i+2]-db[i+2]);
    const daA= Math.abs(da[i+3]-db[i+3]);
    const m = Math.max(dr,dg,dbb,daA);
    if (m !== 0) {
      diffPixels++;
      if (m > maxChannelDiff) maxChannelDiff = m;
      // mark red
      out.data[i] = 255;
      out.data[i+1] = 0;
      out.data[i+2] = 0;
      out.data[i+3] = 255;
    } else {
      out.data[i] = 0;
      out.data[i+1] = 0;
      out.data[i+2] = 0;
      out.data[i+3] = 0;
    }
  }

  diffCanvas.width = w;
  diffCanvas.height = h;
  diffCanvas.getContext("2d").putImageData(out, 0, 0);

  return { diffPixels, maxChannelDiff };
}

async function verifyPixelIdentical(svg0, svg1) {
  const scale = Number($('scale').value);
  const bg = $('bg').value;

  const c0 = $('c0');
  const c1 = $('c1');
  const cd = $('cd');

  const i0 = await renderToCanvas(svg0, c0, scale, bg);
  const i1 = await renderToCanvas(svg1, c1, scale, bg);
  const d = diffImageData(i0, i1, cd);
  return d;
}

function updateKPIs(orig, out, diff) {
  origCharsEl.textContent = orig.length.toLocaleString();
  newCharsEl.textContent  = out.length.toLocaleString();
  const t0 = estTokens(orig), t1 = estTokens(out);
  tokEl.textContent = `${t0.toLocaleString()} → ${t1.toLocaleString()} (${Math.round((1 - t1/t0)*100)}%)`;
  diffEl.textContent = diff ? `${diff.diffPixels.toLocaleString()} px (maxΔ ${diff.maxChannelDiff})` : "—";
}

function stage_SafeCleanup(svgText) {
  const { svg } = parseSVG(svgText);
  removeComments(svg);
  removeMetadata(svg);
  pruneNonRendering(svg);
  pruneUnusedIdsAndDefs(svg);
  minifyAttributes(svg);
  normalizeColors(svg);
  shortenReferencedIds(svg);
  injectFontOverride(svg, $('font').value);
  return serializeSVG(svg);
}

function stage_StyleAndGroups(svgText) {
  const { svg } = parseSVG(svgText);
  safeFlattenGroups(svg);
  applyClassFactorization(svg);
  normalizeColors(svg);
  minifyAttributes(svg);
  return serializeSVG(svg);
}

function stage_PathMinify(svgText) {
  const { svg } = parseSVG(svgText);
  minifyPathData(svg);
  return serializeSVG(svg);
}

function tryPrecisionSearch(svgTextBest, svgTextOrig, mode) {
  // mode: 'geom' or 'path' (only path numbers)
  // test decimals from 6 down to 0
  const decimalsList = [6,4,3,2,1,0];
  return { decimalsList, mode };
}

async function runPrecisionSearch(svgBest, svgOrig, mode) {
  const decimalsList = [6,4,3,2,1,0];
  let best = svgBest;
  for (const d of decimalsList) {
    const { svg } = parseSVG(best);
    roundNumbersInAny(svg, d, mode === "path" ? "path" : "geom");
    const cand = serializeSVG(svg);
    // Only consider if actually smaller
    if (cand.length >= best.length) continue;

    const diff = await verifyPixelIdentical(svgOrig, cand);
    if (diff.diffPixels === 0) {
      log(`✓ Precision ${mode} decimals=${d} accepted (${best.length.toLocaleString()} → ${cand.length.toLocaleString()})`);
      best = cand;
    } else {
      log(`✗ Precision ${mode} decimals=${d} rejected (diffPixels=${diff.diffPixels})`);
    }
  }
  return best;
}

async function runPipeline(svg0) {
  clearLog();
  log("Starting pipeline…");
  const start = performance.now();

  let best = svg0;
  let diff = await verifyPixelIdentical(svg0, svg0);
  updateKPIs(svg0, best, diff);

  // Stage A
  const a = stage_SafeCleanup(best);
  log(`Stage A produced ${a.length.toLocaleString()} chars`);
  diff = await verifyPixelIdentical(svg0, a);
  if (diff.diffPixels === 0 && a.length < best.length) {
    best = a; log("✓ Stage A accepted");
  } else {
    log("✗ Stage A rejected or not smaller");
  }

  // Stage B/C
  const b = stage_StyleAndGroups(best);
  log(`Stage B/C produced ${b.length.toLocaleString()} chars`);
  diff = await verifyPixelIdentical(svg0, b);
  if (diff.diffPixels === 0 && b.length < best.length) {
    best = b; log("✓ Stage B/C accepted");
  } else {
    log("✗ Stage B/C rejected or not smaller");
  }

  // Stage E-lite (path minify)
  const p = stage_PathMinify(best);
  log(`Stage PathMinify produced ${p.length.toLocaleString()} chars`);
  diff = await verifyPixelIdentical(svg0, p);
  if (diff.diffPixels === 0 && p.length < best.length) {
    best = p; log("✓ Path minify accepted");
  } else {
    log("✗ Path minify rejected or not smaller");
  }

  // Precision search: geometry first, then path-only (often safer)
  best = await runPrecisionSearch(best, svg0, "geom");
  best = await runPrecisionSearch(best, svg0, "path");

  // Final verify + KPIs
  diff = await verifyPixelIdentical(svg0, best);
  updateKPIs(svg0, best, diff);

  const end = performance.now();
  log(`Done in ${Math.round(end - start)} ms`);
  return best;
}

// Step mode: run each stage and show accept/reject without full search
async function runStepMode(svg0) {
  clearLog();
  log("Step mode…");

  let cur = svg0;
  let diff = await verifyPixelIdentical(svg0, svg0);
  updateKPIs(svg0, cur, diff);

  const stages = [
    { name: "Stage A (Safe cleanup)", fn: stage_SafeCleanup },
    { name: "Stage B/C (Style + groups)", fn: stage_StyleAndGroups },
    { name: "Stage PathMinify", fn: stage_PathMinify }
  ];

  for (const st of stages) {
    const cand = st.fn(cur);
    log(`${st.name}: ${cand.length.toLocaleString()} chars`);
    diff = await verifyPixelIdentical(svg0, cand);
    if (diff.diffPixels === 0 && cand.length < cur.length) {
      cur = cand; log("  ✓ accepted");
    } else {
      log("  ✗ rejected or not smaller");
    }
    updateKPIs(svg0, cur, diff);
    outTA.value = cur;
  }

  log("Step mode finished. (No precision search in step mode.)");
  return cur;
}

fileInput.addEventListener('change', async () => {
  clearLog();
  const f = fileInput.files?.[0];
  if (!f) return;
  const text = await f.text();
  origTA.value = text;
  outTA.value = text;

  runBtn.disabled = false;
  stepBtn.disabled = false;

  const diff = await verifyPixelIdentical(text, text);
  updateKPIs(text, text, diff);
  log(`Loaded ${f.name} (${text.length.toLocaleString()} chars)`);
});

runBtn.addEventListener('click', async () => {
  runBtn.disabled = true; stepBtn.disabled = true;
  try {
    const svg0 = origTA.value;
    const out = await runPipeline(svg0);
    outTA.value = out;
  } catch (e) {
    log("ERROR: " + (e?.message || e));
  } finally {
    runBtn.disabled = false; stepBtn.disabled = false;
  }
});

stepBtn.addEventListener('click', async () => {
  runBtn.disabled = true; stepBtn.disabled = true;
  try {
    const svg0 = origTA.value;
    const out = await runStepMode(svg0);
    outTA.value = out;
  } catch (e) {
    log("ERROR: " + (e?.message || e));
  } finally {
    runBtn.disabled = false; stepBtn.disabled = false;
  }
});
</script>
